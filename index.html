<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pear Translator</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Фоновые элементы -->
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <div class="wrapper">
        <header class="header">
            <img src="pear.png" alt="Логотип" class="logo" onerror="this.style.display='none';document.querySelector('.logo-fallback').style.display='block'">
            <span class="logo-fallback">🍐</span>
            <h1 class="slogan">Бесконечность — не предел</h1>
        </header>

        <main class="card">
            <div class="lang-bar">
                <div class="lang-group">
                    <label>Исходный</label>
                    <select id="langFrom">
                        <option value="en">English</option>
                        <option value="ru">Русский</option>
                    </select>
                </div>
                <div class="arrow-circle">→</div>
                <div class="lang-group">
                    <label>Перевод</label>
                    <select id="langTo">
                        <option value="ru">Русский</option>
                        <option value="en">English</option>
                    </select>
                </div>
            </div>

            <div class="text-area-wrapper">
                <textarea id="inputText" placeholder="Введите текст для перевода..."></textarea>
                <div class="divider"></div>
                <textarea id="outputText" placeholder="Здесь появится перевод..." readonly></textarea>
            </div>

            <div class="controls">
                <div class="style-select">
                    <label>Стиль</label>
                    <div class="select-custom">
                        <select id="textStyle">
                            <option value="original">Без изменений</option>
                            <option value="formal">Официальный</option>
                            <option value="casual">Разговорный</option>
                            <option value="simple">Простой</option>
                            <option value="poetic">Поэтичный</option>
                        </select>
                    </div>
                </div>
                <div class="btn-group">
                    <button id="clearBtn">Очистить</button>
                    <button id="translateBtn">Перевести</button>
                </div>
            </div>
            <p id="status"></p>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
